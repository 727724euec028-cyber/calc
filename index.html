<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.background{
    position:fixed;
    width:100%;
    height:100%;
}

.background span{
    position:absolute;
    color:rgba(255,255,255,0.2);
    font-size:40px;
    animation:float 12s linear infinite;
}

.background span:nth-child(1){left:5%;animation-duration:10s;}
.background span:nth-child(2){left:15%;animation-duration:12s;}
.background span:nth-child(3){left:25%;animation-duration:8s;}
.background span:nth-child(4){left:35%;animation-duration:14s;}
.background span:nth-child(5){left:45%;animation-duration:10s;}
.background span:nth-child(6){left:55%;animation-duration:13s;}
.background span:nth-child(7){left:65%;animation-duration:9s;}
.background span:nth-child(8){left:75%;animation-duration:11s;}
.background span:nth-child(9){left:85%;animation-duration:15s;}
.background span:nth-child(10){left:95%;animation-duration:10s;}
.background span:nth-child(11){left:50%;animation-duration:12s;}
.background span:nth-child(12){left:30%;animation-duration:14s;}

@keyframes float{
    0%{
        transform:translateY(100vh) rotate(0deg);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

.calculator{
    position:relative;
    z-index:10;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#display{
    width:210px;
    height:45px;
    font-size:22px;
    text-align:right;
    border:none;
    border-radius:10px;
    margin-bottom:10px;
    padding:5px;
}

button{
    width:48px;
    height:48px;
    margin:3px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00bfff;
    color:white;
    transform:scale(1.1);
}

.clear{
    width:210px;
    background:#ff4d4d;
    color:white;
}

.clear:hover{
    background:#d62828;
}
</style>
</head>

<body>

<div class="background">
<span>+</span>
<span>-</span>
<span>×</span>
<span>÷</span>
<span>=</span>
<span>7</span>
<span>9</span>
<span>5</span>
<span>3</span>
<span>8</span>
<span>%</span>
<span>√</span>
</div>

<div class="calculator">
<input type="text" id="display" readonly><br>

<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button onclick="add('/')">/</button><br>

<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button onclick="add('')"></button><br>

<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="add('-')">-</button><br>

<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="add('+')">+</button><br>

<button class="clear" onclick="clearDisplay()">Clear</button>
</div>

<script>
function add(value){
    document.getElementById("display").value += value;
}

function calculate(){
    document.getElementById("display").value =
    eval(document.getElementById("display").value);
}

function clearDisplay(){
    document.getElementById("display").value = "";
}
</script>

</body>
</html>
