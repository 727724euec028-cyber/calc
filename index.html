<!DOCTYPE html>
<html>
<head>
    <title>Unique Calculator</title>
    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364,#6a11cb,#2575fc);
            background-size:400% 400%;
            animation:bg 10s infinite alternate;
        }

        @keyframes bg{
            0%{background-position:left;}
            100%{background-position:right;}
        }

        .calculator{
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(10px);
            padding:20px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        input{
            width:210px;
            height:45px;
            margin-bottom:10px;
            font-size:22px;
            text-align:right;
            border:none;
            border-radius:10px;
            padding:5px;
        }

        button{
            width:48px;
            height:48px;
            margin:3px;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            background:white;
            transition:0.3s;
        }

        button:hover{
            background:#00d4ff;
            color:white;
            transform:scale(1.08);
        }

        .clear{
            width:205px;
            background:#ff4d6d;
            color:white;
        }

        .clear:hover{
            background:#e63946;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly><br>

    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('/')">/</button><br>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('')"></button><br>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('-')">-</button><br>

    <button onclick="add('0')">0</button>
    <button onclick="add('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="add('+')">+</button><br>

    <button class="clear" onclick="clearDisplay()">Clear</button>
</div>

<script>
function add(value){
    document.getElementById("display").value += value;
}

function calculate(){
    document.getElementById("display").value =
    eval(document.getElementById("display").value);
}

function clearDisplay(){
    document.getElementById("display").value = "";
}
</script>

</body>
</html>
